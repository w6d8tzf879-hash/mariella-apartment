const NAV_ORDER = ["home","rules","appliances","supermarkets","gelato","food","beaches","transport","useful"];
const NAV_EMOJI = {home:"🏠",rules:"📋",appliances:"⚡",supermarkets:"🛒",gelato:"🍦",food:"🍽️",beaches:"🏖️",transport:"🚗",useful:"ℹ️"};

let lang = "en";
let activeSection = "home";

function mapsLink(name){ return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(name+" Monopoli")}`; }

function buildLangRow(){
  const row = document.getElementById("lang-row");
  row.innerHTML = LANGS.map(l =>
    `<button class="lang-btn${l.code===lang?' active':''}" onclick="setLang('${l.code}')">${l.label}</button>`
  ).join("");
}

function buildNav(){
  const bar = document.getElementById("nav-bar");
  bar.innerHTML = NAV_ORDER.map(id =>
    `<button class="nav-btn${id===activeSection?' active':''}" onclick="setSection('${id}')">${NAV_EMOJI[id]} ${DATA.navLabels[id][lang]}</button>`
  ).join("");
}

function setLang(l){ lang=l; renderHome(); renderRules(); renderAppliances(); renderPlaces(); buildLangRow(); buildNav(); }
function setSection(s){ activeSection=s; document.querySelectorAll(".section").forEach(el=>el.classList.remove("visible")); const el=document.getElementById("sec-"+s); if(el)el.classList.add("visible"); buildNav(); }

function copyPwd(){
  navigator.clipboard.writeText("curlyink868").catch(()=>{});
  const btn=document.getElementById("copy-btn");
  btn.textContent=DATA.copiedLabel[lang]; btn.classList.add("done");
  setTimeout(()=>{ btn.textContent=DATA.copyLabel[lang]; btn.classList.remove("done"); },2000);
}

function renderHome(){
  const w=DATA.wifi[lang], c=DATA.contact[lang];
  document.getElementById("hdr-sub").textContent=DATA.welcome[lang];
  document.getElementById("wifi-title").textContent=w.title;
  document.getElementById("wifi-5g").textContent=w.net5;
  document.getElementById("wifi-tip").textContent=w.tip;
  document.getElementById("copy-btn").textContent=DATA.copyLabel[lang];
  document.getElementById("contact-title").textContent=c.title;
  document.getElementById("contact-name").textContent=c.name;
  document.getElementById("contact-note").textContent=c.note;
}

function renderRules(){
  const r=DATA.rules[lang], t=DATA.trash[lang];
  document.getElementById("rules-title").textContent=r.title;
  document.getElementById("rules-list").innerHTML=r.items.map((item,i)=>
    `<div class="rule-row${i===r.items.length-1?' last':''}"><span class="rule-icon">${item.icon}</span><span class="rule-text">${item.text}</span></div>`
  ).join("");
  document.getElementById("trash-title").textContent=t.title;
  document.getElementById("trash-intro").textContent=t.intro;
  document.getElementById("trash-table").innerHTML=t.schedule.map(row=>
    `<div class="trash-row"><div class="dots">${row.dots.map(c=>`<div class="dot" style="background:${c};${c==='#6b7280'?'border:1px solid #cbd5e1':''}"></div>`).join("")}</div><span class="trash-day">${row.day}</span><span class="trash-type">${row.type}</span></div>`
  ).join("");
  document.getElementById("trash-note").textContent=t.note;
}

function renderAppliances(){
  const a=DATA.appliances[lang];
  document.getElementById("app-title").textContent=a.title;
  document.getElementById("app-list").innerHTML=a.items.map(item=>`
    <div class="card">
      <div class="app-card">
        <span class="app-icon">${item.icon}</span>
        <div>
          <div class="app-name">${item.name}</div>
          <div class="app-desc">${item.desc}</div>
          ${item.video?`<div class="video-wrap"><iframe src="https://www.youtube.com/embed/krwIA318bZA" allowfullscreen></iframe></div>`:''}
        </div>
      </div>
    </div>`).join("");
}

function renderPlaces(){
  const ml=DATA.mapsLabel[lang];
  Object.keys(PLACES).forEach(key=>{
    document.getElementById("ph-"+key).textContent=DATA.placesTitles[key][lang];
    document.getElementById("pl-"+key).innerHTML=PLACES[key].map(p=>`
      <div class="place-card">
        <div class="place-info">
          <div class="place-name">${p.name}</div>
          <div class="place-desc">${p.desc}</div>
          ${p.hours?`<div class="place-hours">🕐 ${p.hours}</div>`:''}
        </div>
        <a class="map-btn" href="${mapsLink(p.name)}" target="_blank">${ml}</a>
      </div>`).join("");
  });
}

function render(){
  buildLangRow();
  buildNav();
  renderHome();
  renderRules();
  renderAppliances();
  renderPlaces();
  document.getElementById("hdr-sub").textContent=DATA.welcome[lang];
}

render();
setSection("home");
